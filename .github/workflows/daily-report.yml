name: Daily Stock Report

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install
      run: pip install akshare jinja2 pandas requests lxml
      
    - name: Generate
      run: python -u src/main.py
      
    - name: Check output
      run: ls -la dist/ && cat dist/index.html | head -20
      
    - uses: actions/configure-pages@v5
      
    - uses: actions/upload-pages-artifact@v3
      with:
        path: dist
        
    - uses: actions/deploy-pages@v4
