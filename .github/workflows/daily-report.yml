name: Daily Stock Report

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          mkdir -p dist
          echo '<h1>测试</h1>' > dist/index.html
          
      - uses: actions/configure-pages@v5
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          
      - uses: actions/deploy-pages@v4
